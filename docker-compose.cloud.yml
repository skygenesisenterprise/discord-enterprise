services:
  postgres:
    image: postgres:16-alpine
    container_name: discord-enterprise-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: discord_enterprise
      POSTGRES_USER: sge
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U sge -d discord_enterprise"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 10s
    networks:
      - discord_network

  api:
    build:
      context: .
      dockerfile: Dockerfile.cloud
      target: api
    image: discord-enterprise:api
    container_name: discord-enterprise-api
    restart: unless-stopped
    environment:
      NODE_ENV: production
      DATABASE_URL: postgresql://sge:${POSTGRES_PASSWORD}@postgres:5432/discord_enterprise
      SERVER_PORT: 8080
      API_INTERNAL_URL: http://api:8080
      ADMIN_SECRET: ${ADMIN_SECRET}
      DISCORD_TOKEN: ${DISCORD_TOKEN}
      DISCORD_CLIENT_ID: ${DISCORD_CLIENT_ID}
      DISCORD_GUILD_ID: ${DISCORD_GUILD_ID}
    expose:
      - "8080"
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8080/api/v1/health >/dev/null 2>&1 || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 20s
    networks:
      - discord_network

  bot:
    build:
      context: .
      dockerfile: Dockerfile.cloud
      target: bot
    image: discord-enterprise:bot
    container_name: discord-enterprise-bot
    restart: unless-stopped
    environment:
      NODE_ENV: production
      DATABASE_URL: postgresql://sge:${POSTGRES_PASSWORD}@postgres:5432/discord_enterprise
      API_INTERNAL_URL: http://api:8080
      ADMIN_SECRET: ${ADMIN_SECRET}
      DISCORD_TOKEN: ${DISCORD_TOKEN}
      DISCORD_CLIENT_ID: ${DISCORD_CLIENT_ID}
      DISCORD_GUILD_ID: ${DISCORD_GUILD_ID}
    depends_on:
      postgres:
        condition: service_healthy
      api:
        condition: service_healthy
    command:
      - sh
      - -c
      - |
        until pg_isready -h postgres -p 5432 -U sge -d discord_enterprise; do
          echo "Waiting for postgres..."
          sleep 2
        done
        until wget -qO- http://api:8080/api/v1/health >/dev/null 2>&1; do
          echo "Waiting for api..."
          sleep 2
        done
        pnpm --filter bot start
    networks:
      - discord_network

  web:
    build:
      context: .
      dockerfile: Dockerfile.cloud
      target: web
    image: discord-enterprise:web
    container_name: discord-enterprise-web
    restart: unless-stopped
    environment:
      NODE_ENV: production
      NEXT_PUBLIC_API_URL: /api
      API_INTERNAL_URL: http://api:8080
      DISCORD_TOKEN: ${DISCORD_TOKEN}
      DISCORD_CLIENT_ID: ${DISCORD_CLIENT_ID}
      DISCORD_GUILD_ID: ${DISCORD_GUILD_ID}
      ADMIN_SECRET: ${ADMIN_SECRET}
    ports:
      - "3000:3000"
    depends_on:
      api:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:3000/ >/dev/null 2>&1 || exit 1"]
      interval: 20s
      timeout: 5s
      retries: 10
      start_period: 30s
    networks:
      - discord_network

volumes:
  postgres_data:

networks:
  discord_network:
    name: discord_network
