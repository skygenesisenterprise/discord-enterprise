services:
  redis:
    image: docker.io/library/redis:8-alpine
    restart: unless-stopped
    command:
      - redis-server
      - --loglevel
      - warning
      - --requirepass
      - ${REDIS_PASSWORD:-redis-default-password}
    environment:
      REDIS_PASSWORD: ${REDIS_PASSWORD:-redis-default-password}
    expose:
      - "6379"
    healthcheck:
      test:
        - CMD-SHELL
        - redis-cli -a "$${REDIS_PASSWORD}" ping | grep -q PONG
      start_period: 20s
      interval: 30s
      timeout: 5s
      retries: 5
    volumes:
      - type: volume
        source: redis
        target: /data
        volume:
          nocopy: true

  server:
    build:
      context: .
      dockerfile: Dockerfile.cloud
      args:
        DATABASE_URL: ${DATABASE_URL}
    image: skygenesisenterprise/discord-enterprise:${APP_IMAGE_TAG:-cloud}
    restart: unless-stopped
    env_file:
      - .env
    command: server
    expose:
      - "3000"
      - "8080"
    environment:
      NODE_ENV: production
      USE_EMBEDDED_DB: "false"
      LISTEN__TRUSTED_PROXY_CIDRS: 0.0.0.0/0,::/0
      HOST: ${DOMAIN_HOST:-localhost}
      FRONTEND_PORT: "3000"
      API_PORT: "8080"
      DATABASE_URL: ${DATABASE_URL}
      REDIS_ENABLED: "true"
      REDIS_REQUIRED: "false"
      REDIS_HOST: redis
      REDIS_PORT: "6379"
      REDIS_PASSWORD: ${REDIS_PASSWORD:-redis-default-password}
      REDIS_DB: "0"
      REDIS_URL: redis://default:${REDIS_PASSWORD:-redis-default-password}@redis:6379/0
      REDIS_KEY_PREFIX: discord-enterprise:v1
      REDIS_DEFAULT_TTL: "300"
    depends_on:
      redis:
        condition: service_healthy
    volumes:
      - type: volume
        source: media
        target: /media
        volume:
          nocopy: true
      - type: volume
        source: certs
        target: /certs
        volume:
          nocopy: true
      - type: volume
        source: custom-templates
        target: /templates
        volume:
          nocopy: true

  worker:
    build:
      context: .
      dockerfile: Dockerfile.cloud
      args:
        DATABASE_URL: ${DATABASE_URL}
    image: skygenesisenterprise/discord-enterprise:${APP_IMAGE_TAG:-cloud}
    restart: unless-stopped
    env_file:
      - .env
    command: worker
    expose:
      - "8080"
    environment:
      NODE_ENV: production
      USE_EMBEDDED_DB: "false"
      HOST: ${DOMAIN_HOST:-localhost}
      DATABASE_URL: ${DATABASE_URL}
      REDIS_ENABLED: "true"
      REDIS_REQUIRED: "false"
      REDIS_HOST: redis
      REDIS_PORT: "6379"
      REDIS_PASSWORD: ${REDIS_PASSWORD:-redis-default-password}
      REDIS_DB: "0"
      REDIS_URL: redis://default:${REDIS_PASSWORD:-redis-default-password}@redis:6379/0
      REDIS_KEY_PREFIX: discord-enterprise:v1
    depends_on:
      redis:
        condition: service_healthy
    volumes:
      - type: volume
        source: media
        target: /media
        volume:
          nocopy: true
      - type: volume
        source: certs
        target: /certs
        volume:
          nocopy: true
      - type: volume
        source: custom-templates
        target: /templates
        volume:
          nocopy: true

  discord:
    build:
      context: .
      dockerfile: Dockerfile.cloud
      args:
        DATABASE_URL: ${DATABASE_URL}
    image: skygenesisenterprise/discord-enterprise:${APP_IMAGE_TAG:-cloud}
    restart: unless-stopped
    env_file:
      - .env
    command: bot
    environment:
      NODE_ENV: production
      USE_EMBEDDED_DB: "false"
      HOST: ${DOMAIN_HOST:-localhost}
      DATABASE_URL: ${DATABASE_URL}
      REDIS_ENABLED: "true"
      REDIS_REQUIRED: "false"
      REDIS_HOST: redis
      REDIS_PORT: "6379"
      REDIS_PASSWORD: ${REDIS_PASSWORD:-redis-default-password}
      REDIS_DB: "0"
      REDIS_URL: redis://default:${REDIS_PASSWORD:-redis-default-password}@redis:6379/0
      REDIS_KEY_PREFIX: discord-enterprise:v1
    depends_on:
      redis:
        condition: service_healthy
    volumes:
      - type: volume
        source: media
        target: /media
        volume:
          nocopy: true
      - type: volume
        source: certs
        target: /certs
        volume:
          nocopy: true
      - type: volume
        source: custom-templates
        target: /templates
        volume:
          nocopy: true

volumes:
  redis:
  media:
  certs:
  custom-templates:
