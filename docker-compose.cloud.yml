services:
  redis:
    image: docker.io/library/redis:8-alpine
    command:
      - redis-server
      - --loglevel
      - warning
      - --requirepass
      - "${REDIS_PASSWORD:-redis-default-password}"
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "redis-cli -a \"${REDIS_PASSWORD:-redis-default-password}\" ping | grep PONG"]
      start_period: 20s
      interval: 30s
      retries: 5
      timeout: 3s
    volumes:
      - redis:/data
    expose:
      - 6379
    environment: 
      REDIS_PASSWORD: ${REDIS_PASSWORD:-redis-default-password}
      REDIS_URL: redis://default:${REDIS_PASSWORD:-redis-default-password}@redis:6379/0
      REDIS_KEY_PREFIX: discord-enterprise:v1
      DATABASE_URL: ${DATABASE_URL}

  server:
    build:
      context: .
      dockerfile: Dockerfile.cloud
    image: skygenesisenterprise/discord-enterprise:${APP_IMAGE_TAG:-cloud}
    env_file:
      - .env
    restart: unless-stopped
    expose:
      - 3000
      - 8080
    command: server
    environment:
      NODE_ENV: production
      USE_EMBEDDED_DB: "false"
      LISTEN__TRUSTED_PROXY_CIDRS: 0.0.0.0/0,::/0
      HOST: ${DOMAIN_HOST:-localhost}
      FRONTEND_PORT: 3000
      API_PORT: 8080
      REDIS_ENABLED: "true"
      REDIS_REQUIRED: "false"
      REDIS_HOST: redis
      REDIS_PORT: "6379"
      REDIS_PASSWORD: ${REDIS_PASSWORD:-redis-default-password}
      REDIS_DB: "0"
      REDIS_URL: redis://default:${REDIS_PASSWORD:-redis-default-password}@redis:6379/0
      REDIS_KEY_PREFIX: discord-enterprise:v1
      REDIS_DEFAULT_TTL: 300
      DATABASE_URL: ${DATABASE_URL}
    volumes:
      - media:/media
      - certs:/certs
      - custom-templates:/templates
    depends_on:
      redis:
        condition: service_started

  worker:
    build:
      context: .
      dockerfile: Dockerfile.cloud
    image: skygenesisenterprise/discord-enterprise:${APP_IMAGE_TAG:-cloud}
    env_file:
      - .env
    restart: unless-stopped
    expose:
      - 8080
    command: worker
    environment:
      NODE_ENV: production
      USE_EMBEDDED_DB: "false"
      HOST: ${DOMAIN_HOST:-localhost}
      REDIS_ENABLED: "true"
      REDIS_REQUIRED: "false"
      REDIS_HOST: redis
      REDIS_PORT: "6379"
      REDIS_PASSWORD: ${REDIS_PASSWORD:-redis-default-password}
      REDIS_DB: "0"
      REDIS_URL: redis://default:${REDIS_PASSWORD:-redis-default-password}@redis:6379/0
      REDIS_KEY_PREFIX: discord-enterprise:v1
      DATABASE_URL: ${DATABASE_URL}
    volumes:
      - media:/media
      - certs:/certs
      - custom-templates:/templates
    depends_on:
      redis:
        condition: service_started

  discord:
    build:
      context: .
      dockerfile: Dockerfile.cloud
    image: skygenesisenterprise/discord-enterprise:${APP_IMAGE_TAG:-cloud}
    env_file:
      - .env
    restart: unless-stopped
    command: bot
    environment:
      NODE_ENV: production
      USE_EMBEDDED_DB: "false"
      HOST: ${DOMAIN_HOST:-localhost}
      REDIS_ENABLED: "true"
      REDIS_REQUIRED: "false"
      REDIS_HOST: redis
      REDIS_PORT: "6379"
      REDIS_PASSWORD: ${REDIS_PASSWORD:-redis-default-password}
      REDIS_DB: "0"
      REDIS_URL: redis://default:${REDIS_PASSWORD:-redis-default-password}@redis:6379/0
      REDIS_KEY_PREFIX: discord-enterprise:v1
      DATABASE_URL: ${DATABASE_URL}
    volumes:
      - media:/media
      - certs:/certs
      - custom-templates:/templates
    depends_on:
      redis:
        condition: service_started

volumes:
  redis:
  media:
  certs:
  custom-templates:
