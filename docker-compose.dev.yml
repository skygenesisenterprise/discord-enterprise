services:
  discord-enterprise:
    build:
      context: .
      dockerfile: Dockerfile.dev
    image: skygenesisenterprise/discord-enterprise:latest
    container_name: discord-enterprise
    restart: unless-stopped
    ports:
      - "3000:3000"
    expose:
      - "8080"
      - "5432"
    environment:
      NODE_ENV: development
      ENVIRONMENT: development
      DB_HOST: localhost
      DB_PORT: 5432
      DB_USER: aether
      DB_NAME: etheria_account
      DB_PASSWORD: ${DB_PASSWORD:-password}
      DATABASE_URL: postgresql://aether:${DB_PASSWORD:-password}@localhost:5432/etheria_account
      JWT_SECRET: ${JWT_SECRET:-default-secret-change-in-production}
      SERVER_PORT: 8080
      NEXT_PUBLIC_API_URL: http://localhost:3000
      NEXT_PUBLIC_ENVIRONMENT: development
      CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS:-*}
      GIN_MODE: debug
      USE_EMBEDDED_DB: "true"
    volumes:
      - ./server:/app/server
      - ./.air.toml:/app/.air.toml
      - ./app:/app/app:Delegated
      - ./scripts:/app/scripts
      - /app/app/node_modules
      - ./logs:/app/logs
      - /var/run/docker.sock:/var/run/docker.sock
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:3000/health 2>/dev/null || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    logging:
      driver: "json-file"
      options:
        max-size: "20m"
        max-file: "5"
    entrypoint: ["/entrypoint.sh"]

  bot:
    build:
      context: .
      dockerfile: Dockerfile.dev
    image: skygenesisenterprise/discord-enterprise-bot:latest
    container_name: discord-enterprise-bot
    restart: unless-stopped
    environment:
      NODE_ENV: ${NODE_ENV:-development}
      DATABASE_URL: postgresql://aether:${DB_PASSWORD:-password}@discord-enterprise:5432/etheria_account
      API_INTERNAL_URL: http://discord-enterprise:8080
      ADMIN_SECRET: ${ADMIN_SECRET:-change-me}
      DISCORD_TOKEN: ${DISCORD_TOKEN}
      DISCORD_CLIENT_ID: ${DISCORD_CLIENT_ID}
      DISCORD_GUILD_ID: ${DISCORD_GUILD_ID}
    volumes:
      - ./bot:/app/bot
    depends_on:
      discord-enterprise:
        condition: service_healthy
    command:
      - sh
      - -c
      - |
        until pg_isready -h discord-enterprise -p 5432 -U aether -d etheria_account; do
          echo "Waiting for discord-enterprise database..."
          sleep 2
        done
        until wget -qO- http://discord-enterprise:8080/api/v1/health >/dev/null 2>&1; do
          echo "Waiting for discord-enterprise API..."
          sleep 2
        done
        pnpm --filter bot start

volumes:
  postgres_data:

networks:
  discord_network:
    name: discord_network
