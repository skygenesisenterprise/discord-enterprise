services:
  postgresql:
    image: docker.io/library/postgres:16-alpine
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -d $${POSTGRES_DB} -U $${POSTGRES_USER}"]
      start_period: 20s
      interval: 30s
      retries: 5
      timeout: 5s
    volumes:
      - database:/var/lib/postgresql/data
    environment:
      POSTGRES_PASSWORD: ${PG_PASS}
      POSTGRES_USER: ${PG_USER}
      POSTGRES_DB: ${PG_DB}
    expose:
      - 5432

  redis:
    image: docker.io/library/redis:8-alpine
    command:
      - redis-server
      - --loglevel
      - warning
      - --save
      - "60"
      - "1"
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "redis-cli ping | grep PONG"]
      start_period: 20s
      interval: 30s
      retries: 5
      timeout: 3s
    volumes:
      - redis:/data
    expose:
      - 6379

  server:
    build:
      context: .
      dockerfile: Dockerfile.dev
    image: skygenesisenterprise/discord-enterprise:latest-dev
    restart: unless-stopped
    ports:
      - 3000:3000
    expose:
      - 8080
    command: server
    environment:
      REDIS_ENABLED: "true"
      REDIS_REQUIRED: "false"
      REDIS_HOST: redis
      REDIS_PORT: "6379"
      REDIS_PASSWORD: ""
      REDIS_DB: "0"
      REDIS_URL: redis://default:@redis:6379/0
      REDIS_KEY_PREFIX: discord-enterprise:v1
      SECRET_KEY: ${SECRET_KEY}
      LISTEN__TRUSTED_PROXY_CIDRS: 0.0.0.0/0,::/0
      HOST: ${DOMAIN_HOST}
      POSTGRESQL__HOST: postgresql
      POSTGRESQL__USER: ${PG_USER}
      POSTGRESQL__NAME: ${PG_DB}
      POSTGRESQL__PASSWORD: ${PG_PASS}
    volumes:
      - media:/media
      - certs:/certs
      - custom-templates:/templates
    depends_on:
      postgresql:
        condition: service_healthy
      redis:
        condition: service_started
    entrypoint: ["/entrypoint.sh"]

  worker:
    build:
      context: .
      dockerfile: Dockerfile.dev
    image: skygenesisenterprise/discord-enterprise:latest-dev
    restart: unless-stopped
    expose:
      - 8080
    command: worker
    environment:
      REDIS_ENABLED: "true"
      REDIS_REQUIRED: "false"
      REDIS_HOST: redis
      REDIS_PORT: "6379"
      REDIS_PASSWORD: ""
      REDIS_DB: "0"
      REDIS_URL: redis://default:@redis:6379/0
      REDIS_KEY_PREFIX: discord-enterprise:v1
      SECRET_KEY: ${SECRET_KEY}
      HOST: ${DOMAIN_HOST}
      POSTGRESQL__HOST: postgresql
      POSTGRESQL__USER: ${PG_USER}
      POSTGRESQL__NAME: ${PG_DB}
      POSTGRESQL__PASSWORD: ${PG_PASS}
    volumes:
      - media:/media
      - certs:/certs
      - custom-templates:/templates
    depends_on:
      postgresql:
        condition: service_healthy
      redis:
        condition: service_started
    entrypoint: ["/entrypoint.sh"]

  discord:
    build:
      context: .
      dockerfile: Dockerfile.dev
    image: skygenesisenterprise/discord-enterprise:latest-dev
    env_file:
      - .env
    restart: unless-stopped
    command: bot
    environment:
      REDIS_ENABLED: "true"
      REDIS_REQUIRED: "false"
      REDIS_HOST: redis
      REDIS_PORT: "6379"
      REDIS_PASSWORD: ""
      REDIS_DB: "0"
      REDIS_URL: redis://default:@redis:6379/0
      REDIS_KEY_PREFIX: discord-enterprise:v1
      SECRET_KEY: ${SECRET_KEY}
      HOST: ${DOMAIN_HOST}
      POSTGRESQL__HOST: postgresql
      POSTGRESQL__USER: ${PG_USER}
      POSTGRESQL__NAME: ${PG_DB}
      POSTGRESQL__PASSWORD: ${PG_PASS}
    volumes:
      - media:/media
      - certs:/certs
      - custom-templates:/templates
    depends_on:
      postgresql:
        condition: service_healthy
      redis:
        condition: service_started
    entrypoint: ["/entrypoint.sh"]

volumes:
  database:
  redis:
  media:
  certs:
  custom-templates:
